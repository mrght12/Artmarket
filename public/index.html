<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ARTMARKET</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0a0f07;padding:12px}
        .container{max-width:1400px;margin:0 auto}
        .top-bar{background:#000000aa;border-radius:50px;padding:10px 15px;display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap}
        .logo{font-size:1.3rem;font-weight:bold;background:linear-gradient(135deg,#FFD966,#FFA047);background-clip:text;color:transparent}
        .user-block{background:#2a251e;padding:5px 12px;border-radius:40px;display:flex;gap:8px}
        button{background:#b45f2b;border:none;padding:6px 12px;border-radius:40px;color:white;font-weight:bold;cursor:pointer}
        .tabs{display:flex;gap:6px;margin-bottom:15px;flex-wrap:wrap}
        .tab-btn{background:#2c241c;padding:8px 14px}.tab-btn.active{background:#c97e2a}
        .grid{display:grid;gap:12px}
        @media (min-width:500px){.grid{grid-template-columns:repeat(2,1fr)}}
        .card{background:#fffaf2;border-radius:20px;overflow:hidden}
        .card-img{background:#ffe1b3;font-size:2.5rem;text-align:center;padding:10px}
        .card-body{padding:12px}
        .title{font-size:1rem;font-weight:800;display:flex;justify-content:space-between}
        .timer{background:#2a241c;color:#ffcc77;padding:2px 6px;border-radius:30px;font-size:0.6rem}
        .bid-info{background:#ece0cf;border-radius:16px;padding:6px;margin:8px 0;display:flex;justify-content:space-between}
        .price{font-size:1.1rem;color:#bc5a1c}
        .bid-form{display:flex;gap:6px;margin:8px 0}
        .bid-input{flex:1;padding:6px;border-radius:40px;border:1px solid #c9a05e}
        .ban-stamp{background:#aa2e2e;color:white;padding:4px;border-radius:20px;text-align:center;margin-top:6px}
        .admin-actions{display:flex;gap:5px;margin-top:6px}
        .admin-btn{background:#3a2a1a;font-size:0.6rem;padding:3px 6px}
        .shop-buy{background:#2d7547;width:100%;margin-top:8px}
        .commission-note{background:#2c261e;color:#ffbb77;padding:4px;border-radius:12px;font-size:0.6rem;text-align:center;margin-top:6px}
        .message-bar{background:#000000aa;border-radius:30px;padding:8px;text-align:center;margin-bottom:15px;font-size:0.7rem}
        .create-form{background:#2c261e;border-radius:24px;padding:12px;margin-bottom:15px}
        .create-form input{background:#3d3528;border:none;padding:6px;border-radius:40px;color:white;margin:3px;width:calc(33% - 10px)}
        .auth-box{max-width:350px;margin:30px auto;background:#241f18;border-radius:40px;padding:25px;text-align:center}
        .auth-box input{width:100%;padding:10px;margin:10px 0;border-radius:40px;border:none}
        footer{text-align:center;margin-top:20px;color:#ac9a70;font-size:0.7rem}
        .creator-name{font-size:0.65rem;color:#a57c3c}
        @media (max-width:500px){.create-form input{width:100% !important;margin:4px 0}}
    </style>
</head>
<body>
<div id="app"></div>
<script>
    const MAX = 50;
    let currentUser = null;
    let data = { users: [], lots: [], shop: [], bans: [], purchases: [] };
    
    const defaultLots = [
        { id: 1, title: "🍕 Пепперони", desc: "40см, двойной сыр", emoji: "🍕", currentBid: 25, leaderName: "—", creatorName: "system", endTime: Date.now() + 240000, isActive: true },
        { id: 2, title: "🍣 Царский сет", desc: "24 сашими", emoji: "🍣", currentBid: 25, leaderName: "—", creatorName: "system", endTime: Date.now() + 300000, isActive: true },
        { id: 3, title: "🍔 Бургер", desc: "Двойная котлета", emoji: "🍔", currentBid: 25, leaderName: "—", creatorName: "system", endTime: Date.now() + 180000, isActive: true }
    ];
    const defaultShop = [
        { id: 1, name: "🎨 Цифровой арт", desc: "Уникальная работа", price: 25, emoji: "🖼️", sellerName: "system" }
    ];
    
    async function load() {
        let res = await fetch('/api/data');
        data = await res.json();
        if(data.lots.length === 0) data.lots = [...defaultLots];
        if(data.shop.length === 0) data.shop = [...defaultShop];
        if(!data.bans) data.bans = [];
        if(!data.purchases) data.purchases = [];
    }
    async function save() {
        await fetch('/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
    }
    
    async function reg(name) {
        if(!name.trim()){alert("Введите имя");return}
        await load();
        if(data.users.find(u=>u.username===name)){alert("Уже есть");return}
        let isAdmin = (name.trim() === "mrght12");
        data.users.push({ id: Date.now(), username: name, isAdmin: isAdmin });
        await save();
        currentUser = { id: Date.now(), username: name, isAdmin: isAdmin };
        alert(isAdmin ? "✅ Вы АДМИНИСТРАТОР!" : "✅ Добро пожаловать!");
        render();
    }
    async function login(name) {
        await load();
        let u = data.users.find(u=>u.username===name);
        if(!u){alert("Не найден");return}
        currentUser = u;
        render();
    }
    function logout() { currentUser = null; render(); }
    function fmt(t){if(t<=0)return"0:00";let m=Math.floor(t/6e4),s=Math.floor((t%6e4)/1e3);return`${m}:${s<10?'0'+s:s}`}
    function cf(){let c=0;for(let l of data.lots){if(l.isActive&&Date.now()>=l.endTime){l.isActive=false;l.winner=l.leaderName!=="—"?l.leaderName:null;c=1}}if(c)save()}
    
    async function crA(t,d,e,p,mn){
        if(!currentUser)return;
        let pr=parseInt(p),min=parseInt(mn)||3;
        if(isNaN(pr)||pr<1||pr>MAX){alert(`1-${MAX}`);return}
        await load();
        data.lots.push({id:Date.now(), title:t.trim(), desc:d.trim()||"-", emoji:e.trim()||"🍽️", currentBid:pr, leaderName:"—", creatorName:currentUser.username, endTime:Date.now()+6e4*min, isActive:true});
        await save();
        alert("✅ Создан!"); render();
    }
    async function bid(id,am){
        if(!currentUser)return;
        if(am>MAX){alert(`Макс ${MAX}`);return}
        await load();
        let l=data.lots.find(l=>l.id==id);
        if(!l||!l.isActive||Date.now()>=l.endTime){alert("Неактивен");return}
        if(am<=l.currentBid){alert(`> ${l.currentBid}`);return}
        l.currentBid=am; l.leaderName=currentUser.username; l.endTime=Math.max(l.endTime,Date.now()+3e4);
        await save();
        alert(`✅ Ставка ${am}\n💰 Оплата в 49 комнату +10%`); render();
    }
    async function crS(n,d,p,e){
        if(!currentUser)return;
        let pr=parseInt(p);
        if(isNaN(pr)||pr<1||pr>MAX){alert(`1-${MAX}`);return}
        await load();
        data.shop.push({id:Date.now(), name:n.trim(), desc:d.trim()||"-", price:pr, emoji:e.trim()||"📦", sellerName:currentUser.username});
        await save();
        alert("✅ Добавлен!"); render();
    }
    async function buy(id){
        if(!currentUser)return;
        await load();
        let i=data.shop.find(i=>i.id==id);
        if(!i)return;
        let com=Math.floor(i.price*0.05);
        data.purchases.push({id:Date.now(), userId:currentUser.id, userName:currentUser.username, itemName:i.name, itemDesc:i.desc, itemEmoji:i.emoji, price:i.price, sellerName:i.sellerName, commission:com, date:new Date().toLocaleString()});
        data.shop=data.shop.filter(x=>x.id!=id);
        await save();
        alert(`🛒 Куплено за ${i.price}\n💸 Комиссия 5%\n📌 Оплата в 49 комнату`); render();
    }
    async function ban(id){await load();if(!data.bans.includes(id))data.bans.push(id);await save();render()}
    async function unban(id){await load();data.bans=data.bans.filter(x=>x!=id);await save();render()}
    async function delL(id){if(confirm("Удалить?")){await load();data.lots=data.lots.filter(l=>l.id!=id);await save();render()}}
    async function delS(id){if(confirm("Удалить?")){await load();data.shop=data.shop.filter(i=>i.id!=id);await save();render()}}
    
    async function render(){
        let app=document.getElementById('app');if(!app)return;
        await load();cf();
        if(!currentUser){
            app.innerHTML=`<div class=container><div class=top-bar><div class=logo>🎨 ARTMARKET</div></div>
            <div class=auth-box><h2>Вход</h2><input id=name placeholder=Ник><button id=loginBtn>Войти</button>
            <button id=regBtn style=background:#6b4928;margin-top:10px>Регистрация</button>
            <div style=margin-top:15px;color:#ffbb77>⭐ Регистрируйся с ником <b>mrght12</b> — станешь АДМИНОМ<br>Все данные общие для всех!</div></div></div>`;
            document.getElementById('loginBtn')?.onclick=()=>login(document.getElementById('name').value);
            document.getElementById('regBtn')?.onclick=()=>reg(document.getElementById('name').value);
            return;
        }
        let tab=localStorage.getItem('tab')||'auction',adm=currentUser.isAdmin===true;
        let form=tab==='auction'?`<div class=create-form><input id=t placeholder=Название><input id=d placeholder=Описание><input id=e placeholder=🍕><input id=p placeholder=Старт value=25><input id=m placeholder=Мин value=3><button id=crA>➕</button></div>`
            :`<div class=create-form><input id=n placeholder=Название><input id=d placeholder=Описание><input id=e placeholder=🎁><input id=pr placeholder=Цена><button id=crS>➕</button></div>`;
        let items='';
        if(tab==='auction'){
            for(let l of data.lots){
                let tl=l.isActive?Math.max(0,l.endTime-Date.now()):0,bn=data.bans.includes(l.id);
                items+=`<div class=card><div class=card-img>${l.emoji}</div><div class=card-body>
                    <div class=title>${l.title}<span class=timer>${l.isActive?fmt(tl):"🔒"}</span></div>
                    <div class=creator-name>👤 ${l.creatorName}</div><div>${l.desc}</div>
                    <div class=bid-info><span>🎨 Ставка</span><span class=price>${l.currentBid}/${MAX}</span></div>
                    <div>👑 ${l.leaderName}</div>
                    ${l.isActive?(!bn?`<div class=bid-form><input id=bid_${l.id} class=bid-input placeholder=ставка><button onclick=bid(${l.id},parseInt(document.getElementById('bid_${l.id}').value))>💸</button></div><div class=commission-note>❗ +10%</div>`:`<div class=ban-stamp>⛔ ЗАБАНЕНО</div>`):`<div class=ban-stamp style=background:#2c6b2f>🏆 ${l.winner||'никто'}</div>`}
                    ${adm?`<div class=admin-actions>${!bn?`<button class=admin-btn onclick=ban(${l.id})>🔨</button>`:`<button class=admin-btn onclick=unban(${l.id})>✅</button>`}<button class=admin-btn onclick=delL(${l.id})>🗑️</button></div>`:''}
                </div></div>`;
            }
        }else if(tab==='shop'){
            for(let i of data.shop){
                items+=`<div class=card><div class=card-img>${i.emoji}</div><div class=card-body>
                    <div class=title>${i.name}</div><div>📦 ${i.sellerName}</div><div>${i.desc}</div>
                    <div class=bid-info><span>💰 Цена</span><span class=price>${i.price}/${MAX}</span></div>
                    <button class=shop-buy onclick=buy(${i.id})>КУПИТЬ</button>
                    <div class=commission-note>💸 +5%</div>
                    ${adm?`<button class=admin-btn onclick=delS(${i.id})>🗑️</button>`:''}
                </div></div>`;
            }
        }else{
            let my=data.purchases.filter(p=>p.userId==currentUser.id);
            for(let p of my){items+=`<div class=card><div class=card-img>${p.itemEmoji||"🛍️"}</div><div class=card-body><div class=title>${p.itemName}</div><div>${p.itemDesc}</div><div class=bid-info><span>💰 Уплачено</span><span class=price>${p.price}</span></div><div class=ban-stamp style=background:#2c6b2f>✅ Оплата в 49 комнату</div></div></div>`}
            if(!my.length)items='<div style=color:#aaa;text-align:center;padding:40px>📭 Нет покупок</div>';
        }
        app.innerHTML=`<div class=container><div class=top-bar><div class=logo>🎨 ARTMARKET</div><div class=user-block><span>👤 ${currentUser.username}${adm?' ⭐АДМИН':''}</span><button onclick=logout()>🚪</button></div></div>
        <div class=tabs><button class="tab-btn ${tab==='auction'?'active':''}" onclick="localStorage.setItem('tab','auction');render()">🏆 АУК</button>
        <button class="tab-btn ${tab==='shop'?'active':''}" onclick="localStorage.setItem('tab','shop');render()">🛒 ШОП</button>
        <button class="tab-btn ${tab==='purchases'?'active':''}" onclick="localStorage.setItem('tab','purchases');render()">📦 МОИ</button></div>
        ${form}<div class=message-bar>💰 Комиссия: +10% аук | +5% шоп | макс ${MAX} артов<br>📍 Оплата в <b>49 КОМНАТУ</b></div>
        <div class=grid>${items}</div><footer>⚡ Все данные общие для всех устройств! Админ mrght12 банит и удаляет.</footer></div>`;
        document.getElementById('crA')?.onclick=()=>crA(document.getElementById('t').value,document.getElementById('d').value,document.getElementById('e').value,document.getElementById('p').value,document.getElementById('m').value);
        document.getElementById('crS')?.onclick=()=>crS(document.getElementById('n').value,document.getElementById('d').value,document.getElementById('pr').value,document.getElementById('e').value);
    }
    render(); setInterval(render,3000);
</script>
</body>
  </html>
