<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTMARKET · макс 50 артов</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0a0f07;padding:20px}
        .container{max-width:1400px;margin:0 auto}
        .top-bar{background:#000000aa;border-radius:60px;padding:12px 25px;display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:25px;border:1px solid #ffcc77}
        .logo{font-size:1.8rem;font-weight:bold;background:linear-gradient(135deg,#FFD966,#FFA047);background-clip:text;color:transparent}
        .user-block{background:#2a251e;padding:6px 20px;border-radius:40px;display:flex;gap:15px}
        button{background:#b45f2b;border:none;padding:8px 16px;border-radius:40px;color:white;font-weight:bold;cursor:pointer}
        .tabs{display:flex;gap:10px;margin-bottom:25px}
        .tab-btn{background:#2c241c;padding:10px 20px}.tab-btn.active{background:#c97e2a}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .card{background:#fffaf2;border-radius:28px;overflow:hidden}
        .card-img{background:#ffe1b3;font-size:3rem;text-align:center;padding:15px}
        .card-body{padding:15px}
        .title{font-size:1.3rem;font-weight:800;display:flex;justify-content:space-between}
        .timer{background:#2a241c;color:#ffcc77;padding:2px 10px;border-radius:30px;font-size:0.7rem}
        .bid-info{background:#ece0cf;border-radius:20px;padding:8px;margin:10px 0;display:flex;justify-content:space-between}
        .price{font-size:1.3rem;color:#bc5a1c}
        .bid-form{display:flex;gap:8px;margin:10px 0}
        .bid-input{flex:1;padding:8px;border-radius:60px;border:1px solid #c9a05e;text-align:center}
        .ban-stamp{background:#aa2e2e;color:white;padding:5px;border-radius:30px;text-align:center;margin-top:8px;font-size:0.7rem}
        .admin-actions{display:flex;gap:6px;margin-top:8px}
        .admin-btn{background:#3a2a1a;font-size:0.65rem;padding:4px 8px}
        .shop-buy{background:#2d7547;width:100%;margin-top:10px}
        .commission-note{background:#2c261e;color:#ffbb77;padding:5px;border-radius:16px;font-size:0.65rem;text-align:center;margin-top:8px}
        .message-bar{background:#000000aa;border-radius:30px;padding:8px;text-align:center;margin-bottom:20px;font-size:0.8rem}
        .create-form{background:#2c261e;border-radius:28px;padding:15px;margin-bottom:20px}
        .create-form input{background:#3d3528;border:none;padding:8px;border-radius:40px;color:white;margin:3px}
        .auth-box{max-width:350px;margin:40px auto;background:#241f18;border-radius:40px;padding:25px;text-align:center}
        .auth-box input{width:100%;padding:10px;margin:10px 0;border-radius:40px;border:none}
        footer{text-align:center;margin-top:30px;color:#ac9a70;font-size:0.7rem}
        .creator-name{font-size:0.7rem;color:#a57c3c}
    </style>
</head>
<body>
<div id="app"></div>

<script>
    let u=null;
    const MAX=50;
    function g(k){return JSON.parse(localStorage.getItem(k)||'[]')}
    function s(k,v){localStorage.setItem(k,JSON.stringify(v))}
    function init(){
        let us=g('u');
        if(!us.length)s('u',[{id:1,username:"mrght12",admin:1}]);
        else{let a=us.find(x=>x.username==="mrght12");if(a&&!a.admin)a.admin=1;if(!a)us.push({id:Date.now(),username:"mrght12",admin:1});s('u',us);}
        if(!g('l').length)s('l',[
            {id:1,t:"🍕 Пепперони",d:"40см, сыр",e:"🍕",b:25,ln:"—",cr:"mrght12",et:Date.now()+240000,ac:1},
            {id:2,t:"🍣 Царский сет",d:"24 сашими",e:"🍣",b:25,ln:"—",cr:"mrght12",et:Date.now()+300000,ac:1},
            {id:3,t:"🍔 Бургер",d:"Двойной",e:"🍔",b:25,ln:"—",cr:"mrght12",et:Date.now()+180000,ac:1}
        ]);
        if(!g('sh').length)s('sh',[
            {id:11,n:"🎨 Арт",d:"Иллюстрация",p:25,e:"🖼️",sl:"mrght12"},
            {id:12,n:"🍪 Печенье",d:"Предсказание",p:15,e:"🍪",sl:"mrght12"}
        ]);
        if(!g('b'))s('b',[]);
        if(!g('p'))s('p',[]);
    }
    function reg(name){
        if(!name.trim()){alert("Введите имя");return}
        if(g('u').find(x=>x.username.toLowerCase()===name.toLowerCase())){alert("Уже есть");return}
        let nu={id:Date.now(),username:name.trim(),admin:(name.trim()==="mrght12"?1:0)};
        let us=g('u');us.push(nu);s('u',us);u=nu;localStorage.setItem('cu',JSON.stringify(u));render();
    }
    function login(name){
        let f=g('u').find(x=>x.username.toLowerCase()===name.toLowerCase());
        if(!f){alert("Не найден");return}
        u=f;localStorage.setItem('cu',JSON.stringify(u));render();
    }
    function logout(){u=null;localStorage.removeItem('cu');render();}
    function fm(t){if(t<=0)return"0:00";let m=Math.floor(t/60000),ss=Math.floor((t%60000)/1000);return `${m}:${ss<10?'0'+ss:ss}`}
    function isB(id){return g('b').includes(id)}
    function cf(){let l=g('l'),c=0;for(let i of l){if(i.ac&&Date.now()>=i.et){i.ac=0;i.w=i.ln!=="—"?i.ln:null;c=1}}if(c)s('l',l);}
    function crA(t,d,e,p,mn){
        if(!u){alert("Войдите");return}
        let pr=parseInt(p),min=parseInt(mn)||3;
        if(isNaN(pr)||pr<1||pr>MAX){alert(`Цена от 1 до ${MAX}`);return}
        let l=g('l');l.push({id:Date.now(),t:t.trim(),d:d.trim()||"-",e:e.trim()||"🍽️",b:pr,ln:"—",cr:u.username,et:Date.now()+60000*min,ac:1});
        s('l',l);alert(`✅ Создан`);render();
    }
    function bid(id,am){
        if(!u){alert("Войдите");return}
        if(isB(id)){alert("Забанено");return}
        if(am>MAX){alert(`Максимум ${MAX} артов!`);return}
        let l=g('l'),lot=l.find(x=>x.id===id);
        if(!lot||!lot.ac||Date.now()>=lot.et){alert("Неактивен");return}
        if(am<=lot.b){alert(`Ставка > ${lot.b}`);return}
        lot.b=am;lot.ln=u.username;lot.et=Math.max(lot.et,Date.now()+30000);
        s('l',l);alert(`✅ Ставка ${am} артов\n💰 Оплата в 49 комнату +10%`);render();
    }
    function crS(n,d,p,e){
        if(!u){alert("Войдите");return}
        let pr=parseInt(p);
        if(isNaN(pr)||pr<1||pr>MAX){alert(`Цена от 1 до ${MAX}`);return}
        let sh=g('sh');sh.push({id:Date.now(),n:n.trim(),d:d.trim()||"-",p:pr,e:e.trim()||"📦",sl:u.username});
        s('sh',sh);alert(`✅ Товар добавлен`);render();
    }
    function buy(id){
        if(!u){alert("Войдите");return}
        let sh=g('sh'),item=sh.find(x=>x.id===id);
        if(!item)return;
        let com=Math.floor(item.p*0.05),pu=g('p');
        pu.push({id:Date.now(),uid:u.id,un:u.username,in:item.n,idsc:item.d,iem:item.e,pr:item.p,sel:item.sl,com:com,dt:new Date().toLocaleString()});
        s('p',pu);alert(`🛒 Куплено за ${item.p} артов\n💸 Комиссия 5% админу\n📌 Оплата в 49 комнату`);
        s('sh',sh.filter(x=>x.id!==id));render();
    }
    function ban(id){let b=g('b');if(!b.includes(id))b.push(id);s('b',b);render();}
    function unban(id){let b=g('b');s('b',b.filter(x=>x!==id));render();}
    function delLot(id){if(confirm("Удалить?")){s('l',g('l').filter(x=>x.id!==id));render();}}
    function delShop(id){if(confirm("Удалить?")){s('sh',g('sh').filter(x=>x.id!==id));render();}}
    
    function render(){
        let app=document.getElementById('app');if(!app)return;
        cf();let lots=g('l'),shop=g('sh'),purch=g('p'),log=!!u,adm=u?.admin;
        if(!log){
            app.innerHTML=`<div class=container><div class=top-bar><div class=logo>🎨 ARTMARKET (макс ${MAX} артов)</div></div>
            <div class=auth-box><h2>Вход</h2><input id=name placeholder=Username><button id=loginBtn>Войти</button>
            <button id=regBtn style=background:#6b4928;margin-top:10px>Регистрация</button><div style=margin-top:15px;color:#ffbb77>⭐ Админ: mrght12</div></div></div>`;
            document.getElementById('loginBtn')?.onclick=()=>login(document.getElementById('name').value);
            document.getElementById('regBtn')?.onclick=()=>reg(document.getElementById('name').value);
            return;
        }
        let tab=localStorage.getItem('tab')||'auction';
        let form=tab==='auction'?
            `<div class=create-form><input id=t placeholder=Название><input id=d placeholder=Описание><input id=e placeholder=🍕 style=width:60px><input id=p placeholder=Старт value=25 style=width:80px><input id=m placeholder=Мин value=3 style=width:60px><button id=crA>➕</button></div>`
            :`<div class=create-form><input id=n placeholder=Название><input id=de placeholder=Описание><input id=em placeholder=🎁 style=width:60px><input id=pr placeholder=Цена style=width:80px><button id=crS>➕</button></div>`;
        
        let items='';
        if(tab==='auction'){
            for(let l of lots){
                let tl=l.ac?Math.max(0,l.et-Date.now()):0;
                let baned=isB(l.id);
                items+=`<div class=card><div class=card-img>${l.e}</div><div class=card-body>
                    <div class=title>${l.t}<span class=timer>${l.ac?fm(tl):"🔒"}</span></div>
                    <div class=creator-name>👤 ${l.cr}</div><div>${l.d}</div>
                    <div class=bid-info><span>🎨 Ставка</span><span class=price>${l.b}/${MAX} артов</span></div>
                    <div>👑 ${l.ln}</div>
                    ${l.ac?(!baned?`<div class=bid-form><input id=bid_${l.id} class=bid-input placeholder=ставка max=${MAX}><button onclick=bid(${l.id},parseInt(document.getElementById('bid_${l.id}').value))>💸</button></div>
                    <div class=commission-note>❗ +10% комиссии</div>`:`<div class=ban-stamp>⛔ ЗАБАНЕНО</div>`):`<div class=ban-stamp style=background:#2c6b2f>🏆 ${l.w||'никто'}</div>`}
                    ${adm?`<div class=admin-actions>${!baned?`<button class=admin-btn onclick=ban(${l.id})>🔨</button>`:`<button class=admin-btn onclick=unban(${l.id})>✅</button>`}<button class=admin-btn onclick=delLot(${l.id})>🗑️</button></div>`:''}
                </div></div>`;
            }
        }else if(tab==='shop'){
            for(let i of shop){
                items+=`<div class=card><div class=card-img>${i.e}</div><div class=card-body>
                    <div class=title>${i.n}</div><div class=creator-name>📦 ${i.sl}</div><div>${i.d}</div>
                    <div class=bid-info><span>💰 Цена</span><span class=price>${i.p}/${MAX} артов</span></div>
                    <button class=shop-buy onclick=buy(${i.id})>КУПИТЬ</button>
                    <div class=commission-note>💸 +5% админу</div>
                    ${adm?`<button class=admin-btn onclick=delShop(${i.id})>🗑️</button>`:''}
                </div></div>`;
            }
        }else{
            let my=purch.filter(x=>x.uid===u.id);
            for(let p of my){
                items+=`<div class=card><div class=card-img>${p.iem||"🛍️"}</div><div class=card-body>
                    <div class=title>${p.in}</div><div>${p.idsc}</div>
                    <div class=bid-info><span>💰 Уплачено</span><span class=price>${p.pr} артов</span></div>
                    <div class=commission-note>💸 Комиссия: ${p.com} артов</div>
                    <div class=ban-stamp style=background:#2c6b2f>✅ Оплата в 49 комнату</div>
                </div></div>`;
            }
            if(!my.length)items='<div class=empty-message>📭 Нет покупок</div>';
        }
        
        app.innerHTML=`<div class=container><div class=top-bar><div class=logo>🎨 ARTMARKET (макс ${MAX} артов)</div>
            <div class=user-block><span>👤 ${u.username}${adm?' ⭐АДМИН':''}</span><button onclick=logout()>🚪</button></div></div>
            <div class=tabs><button class="tab-btn ${tab==='auction'?'active':''}" onclick="localStorage.setItem('tab','auction');render()">🏆 АУК</button>
            <button class="tab-btn ${tab==='shop'?'active':''}" onclick="localStorage.setItem('tab','shop');render()">🛒 ШОП</button>
            <button class="tab-btn ${tab==='purchases'?'active':''}" onclick="localStorage.setItem('tab','purchases');render()">📦 МОИ</button></div>
            ${form}<div class=message-bar>💰 Комиссия: +10% аукцион | +5% магазин | 💎 макс ${MAX} артов<br>📍 Оплата в <b>49 КОМНАТУ</b></div>
            <div class=grid>${items||'<div class=empty-message>Пусто</div>'}</div><footer>⚡ Админ mrght12 банит и удаляет</footer></div>`;
        
        document.getElementById('crA')?.onclick=()=>{
            let t=document.getElementById('t').value,d=document.getElementById('d').value,e=document.getElementById('e').value,p=document.getElementById('p').value,m=document.getElementById('m').value;
            crA(t,d,e,p,m);
        };
        document.getElementById('crS')?.onclick=()=>{
            let n=document.getElementById('n').value,de=document.getElementById('de').value,pr=document.getElementById('pr').value,em=document.getElementById('em').value;
            crS(n,de,pr,em);
        };
    }
    
    init();
    let su=localStorage.getItem('cu');
    if(su){try{let x=JSON.parse(su);let f=g('u').find(y=>y.id===x.id);if(f)u=f;}catch(e){}}
    render();
    setInterval(()=>{if(document.getElementById('app'))render();},2000);
</script>
</body>
</html>
